{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>
            {% if customer %}
                Edit Customer
            {% else %}
                Add Customer
            {% endif %}
        </h3>

        <a href="/customers/" class="btn btn-secondary">
            Back
        </a>

    </div>

    <form
        method="post"
        action="{% if customer %}/customers/{{ customer.id }}/update{% else %}/customers/create{% endif %}">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Company Name</label>

                <input
                    type="text"
                    class="form-control"
                    name="company_name"
                    value="{{ customer.company_name if customer else '' }}"
                    required>

            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Contact Person</label>

                <input
                    type="text"
                    class="form-control"
                    name="contact_person"
                    value="{{ customer.contact_person if customer else '' }}">

            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Mobile</label>

                <input
                    type="text"
                    class="form-control"
                    name="mobile"
                    value="{{ customer.mobile if customer else '' }}">

            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">GST Number</label>

                <input
                    type="text"
                    class="form-control"
                    name="gst_number"
                    value="{{ customer.gst_number if customer else '' }}">

            </div>

        </div>

        <button class="btn btn-primary">

            {% if customer %}
                Update Customer
            {% else %}
                Save Customer
            {% endif %}

        </button>

    </form>

</div>

{% endblock %}
